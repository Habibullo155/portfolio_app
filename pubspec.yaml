name: portfolio
description: "A modern, beautiful portfolio application built with Flutter"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  
  # UI & Animations
  cupertino_icons: ^1.0.6

  #font_awesome
  font_awesome_flutter: ^10.12.0
  
  # URL Launcher for opening links
  url_launcher: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/
    - assets/profile.jpg
    - assets/project1.jpg
    - assets/project2.jpg
    - assets/project3.jpg
    - assets/project4.jpg

  # Fonts (if you want to add custom fonts)
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
  #       - asset: fonts/CustomFont-Bold.ttf
  #         weight: 700